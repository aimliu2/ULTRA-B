        if (existingRange) {
          pane.chart.timeScale().setVisibleLogicalRange(existingRange);
          pane.visibleLogicalRange = existingRange;
          return;
        }

        const to = data.length - 1 + chartPaddingBars;
        const from = Math.max(0, to - chartInitialVisibleBars);
        pane.visibleLogicalRange = { from, to };
        pane.chart.timeScale().setVisibleLogicalRange(pane.visibleLogicalRange);
      }

      function renderEvents(events) {
        const logEvents = events.filter((event) => event.display_event_log !== false);
        latestEvents = [...logEvents];
        const root = document.getElementById("eventLog");
        if (!logEvents.length) {
          root.innerHTML = "<div class=\"event-row\">No events yet.</div>";
          return;
        }

        const html = [...logEvents].reverse().map((event) => `
          <div class="event-row">
            <div class="event-main">${timeframeBadgeHtml(event.tf)}${event.bar_event} · ${event.tier.toUpperCase()} · ${event.side}</div>
            <div>decision: ${formatTimestamp(event.decision_ts)}</div>
            ${event.event_type === "fvg"
              ? event.event_code === "CE02"
                ? `
                  <div>bar2: ${formatTimestamp(event.anchor_ts)} · type: ${event.fvg_type}</div>
                  <div>high: ${event.gap_top.toFixed(5)} · low: ${event.gap_bottom.toFixed(5)} · size: ${event.gap_size.toFixed(5)}</div>
                `
                : `
                  <div>type: ${event.fvg_type} · sub: ${event.sub_type} · bar2 close: ${event.bar2_close.toFixed(5)}</div>
                `
              : event.event_type === "bos"
              ? `
                <div>pivot: ${formatTimestamp(event.anchor_ts)} · ${event.price.toFixed(5)} · ${event.side}</div>
                <div>level: ${formatTimestamp(event.level_ts)} · ${event.level_price.toFixed(5)} · ${event.level_side}</div>
              `
              : `
                <div>pivot: ${formatTimestamp(event.anchor_ts)}</div>
                <div>price: ${event.price.toFixed(5)}</div>
              `
            }
          </div>
        `).join("");
        root.innerHTML = html;
      }

      function eventsToClipboardText(events) {
        if (!events.length) {
          return "No events yet.";
        }

        return [...events].reverse().map((event) => {
          if (event.event_type === "fvg") {
            const lines = [
              `{tf:'${String(event.tf || "").toUpperCase()}'} ${event.bar_event} · CE · ${event.fvg_type}`,
              `decision: ${formatTimestamp(event.decision_ts)}`,
            ];
            if (event.event_code === "CE02") {
              lines.push(`gap: ${event.gap_bottom.toFixed(5)} → ${event.gap_top.toFixed(5)} · size: ${event.gap_size.toFixed(5)}`);
            } else {
              lines.push(`bar2 close: ${event.bar2_close.toFixed(5)} · sub: ${event.sub_type}`);
            }
            return lines.join("\n");
          }

          if (event.event_type === "bos") {
            return [
              `{tf:'${String(event.tf || "").toUpperCase()}'} ${event.bar_event} · ${event.tier.toUpperCase()} · ${event.side}`,
              `decision: ${formatTimestamp(event.decision_ts)}`,
              `pivot: ${formatTimestamp(event.anchor_ts)} · ${event.price.toFixed(5)} · ${event.side}`,
              `level: ${formatTimestamp(event.level_ts)} · ${event.level_price.toFixed(5)} · ${event.level_side}`,
            ].join("\n");
          }

          return [
            `{tf:'${String(event.tf || "").toUpperCase()}'} ${event.bar_event} · ${event.tier.toUpperCase()} · ${event.side}`,
            `decision: ${formatTimestamp(event.decision_ts)}`,
            `pivot: ${formatTimestamp(event.anchor_ts)}`,
            `price: ${event.price.toFixed(5)}`,
          ].join("\n");
        }).join("\n\n");
      }

      async function copyEventLog() {
        const button = document.getElementById("copyEventsBtn");
        const originalLabel = "Copy";
        const text = eventsToClipboardText(latestEvents);

        try {
          await navigator.clipboard.writeText(text);
          button.title = "Copied";
          button.setAttribute("aria-label", "Copied");
        } catch (error) {
          button.title = "Copy failed";
          button.setAttribute("aria-label", "Copy failed");
        }

        setTimeout(() => {
          button.title = originalLabel;
          button.setAttribute("aria-label", originalLabel);
        }, 1200);
      }

      async function copyContextSection() {
        const button = document.getElementById("copyContextBtn");
        const sections = [
          { label: "Snapshot",  id: "ctxSnapshot"  },
          { label: "Liquidity", id: "ctxLevels"    },
          { label: "Zones",     id: "ctxZones"     },
          { label: "Structure", id: "ctxStructure" },
        ];
        const text = sections
          .map((s) => `=== ${s.label} ===\n${document.getElementById(s.id).innerText.trim()}`)
          .join("\n\n");
        try {
          await navigator.clipboard.writeText(text);
          button.title = "Copied";
          button.setAttribute("aria-label", "Copied");
        } catch {
          button.title = "Copy failed";
          button.setAttribute("aria-label", "Copy failed");
        }
        setTimeout(() => {
          button.title = "Copy All";
          button.setAttribute("aria-label", "Copy All");
        }, 1200);
      }

      function setStatus(text) {
        document.getElementById("status").textContent = text;
      }

      function setReplayButtons(active) {
        document.getElementById("stepBtn").disabled = !active;
        document.getElementById("playPauseBtn").disabled = !active;
        document.getElementById("resetBtn").disabled = !active;
      }

      function updatePlayPauseButton() {
        const button = document.getElementById("playPauseBtn");
        const label = playTimer ? "Pause" : "Play";
        button.title = label;
        button.setAttribute("aria-label", label);
      }

      function playbackIntervalMs() {
        return Math.max(80, Math.round(PLAY_INTERVAL_MS / playbackSpeed));
      }

      function stepHoldIntervalMs() {
        return Math.max(40, Math.round(STEP_HOLD_INTERVAL_MS / playbackSpeed));
      }

      function updatePlaybackSpeed(value) {
        playbackSpeed = Math.min(4, Math.max(1, Number.parseInt(value, 10) || 1));
        document.getElementById("playSpeedValue").textContent = `x${playbackSpeed}`;
        if (playTimer) {
          stopPlay();
          startPlay();
        }
        if (stepHoldRepeatTimer) {
          clearInterval(stepHoldRepeatTimer);
          stepHoldRepeatTimer = setInterval(stepOnce, stepHoldIntervalMs());
        }
      }

      function fillSymbolSelector(payload) {
        symbolPayload = payload;
        const select = document.getElementById("symbolSelect");
        select.innerHTML = "";

        for (const symbol of payload.symbols) {
          const option = document.createElement("option");
          option.value = symbol;
          option.textContent = symbol;
          option.selected = symbol === payload.default_symbol;
          select.appendChild(option);
        }
      }

      function fillTimeframeSelector(options, selectedValue) {
        const select = document.getElementById("timeframeSelect");
        select.innerHTML = "";

        for (const optionData of options) {
          const option = document.createElement("option");
          option.value = optionData.value;
          option.textContent = optionData.label;
          option.selected = optionData.value === selectedValue;
          select.appendChild(option);
        }
        updateStartTimeStep();
      }

      function fillDualComboSelector(combos, selectedValue) {
        const select = document.getElementById("dualComboSelect");
        select.innerHTML = "";
        for (const [key, combo] of Object.entries(combos || {})) {
          const option = document.createElement("option");
          option.value = key;
          option.textContent = combo.label || `${combo.lower_tf} / ${combo.higher_tf}`;
          option.selected = key === selectedValue;
          select.appendChild(option);
        }
        updateStartTimeStep();
      }

      function updateModeUi(modeValue) {
        const isDual = modeValue === "dual";
        updateModeButtons(modeValue);
        document.getElementById("dualComboField").classList.toggle("is-hidden", !isDual);
        document.getElementById("timeframeField").classList.toggle("is-hidden", isDual);
        document.getElementById("timeframeSelect").disabled = isDual;
        updateStartTimeStep();
      }

      function setChartMode(modeValue, labels = {}) {
        currentSnapshotMode = modeValue;
        const isDual = modeValue === "dual";
        document.getElementById("chartStack").classList.toggle("is-dual", isDual);
        document.getElementById("bottomPane").classList.toggle("is-hidden", !isDual);
        document.getElementById("topPaneLabel").textContent = isDual
          ? `${labels.lower_tf || "Lower TF"} · ${labels.symbol || ""}`.trim()
          : `${labels.timeframe || labels.lower_tf || "Replay"} · ${labels.symbol || ""}`.trim();
        document.getElementById("bottomPaneLabel").textContent = isDual
          ? `${labels.higher_tf || "Higher TF"} · ${labels.symbol || ""}`.trim()
          : "";
      }

      async function refreshTimeframes(symbol, preferredTimeframe = null) {
        const response = await fetch(`/api/timeframes?symbol=${encodeURIComponent(symbol)}`);
        const payload = await response.json();
        const available = payload.timeframes || [];
        const selected = available.some((item) => item.value === preferredTimeframe)
          ? preferredTimeframe
          : (available[0]?.value || payload.default_timeframe);
        fillTimeframeSelector(available, selected);
        return payload;
      }

      function applySnapshot(snapshot, options = {}) {
        latestStatusSnapshot = snapshot;
        const preserveViewport = options.preserveViewport !== false;
        const isDual = snapshot.mode === "dual";
        const cursorUnix = snapshot.cursor_time
          ? Math.floor(new Date(snapshot.cursor_time).getTime() / 1000)
          : null;
        if (isDual) {
          setChartMode("dual", {
            symbol: snapshot.symbol,
            lower_tf: snapshot.lower_tf,
            higher_tf: snapshot.higher_tf,
          });
          const lowerBars = snapshot.lower_bars || [];
          const higherBars = snapshot.higher_bars || [];
          const lowerEvents = (snapshot.events || []).filter((event) => event.tf === snapshot.lower_tf);
          const higherEvents = (snapshot.events || []).filter((event) => event.tf === snapshot.higher_tf);
          renderChartPane("top", lowerBars, { preserveViewport, timeframe: snapshot.lower_tf, events: lowerEvents });
          renderMarkersForPane("top", lowerEvents, lowerBars);
          renderZonesForPane("top", snapshot.zones, cursorUnix, { lowerTf: snapshot.lower_tf, higherTf: snapshot.higher_tf });
          if (snapshot.projected_structure && snapshot.lower_structure) {
            updateStructurePdLines("top", snapshot.lower_structure, { role: "native", lineStyle: 2 });
            updateStructurePdLines("top", snapshot.projected_structure, { role: "projected" });
          } else {
            updateStructurePdLines("top", snapshot.projected_structure || snapshot.lower_structure || null, { role: "native" });
            clearStructurePdLines("top", "projected");
          }
          renderChartPane("bottom", higherBars, { preserveViewport, timeframe: snapshot.higher_tf, events: higherEvents });
          renderMarkersForPane("bottom", higherEvents, higherBars);
          renderZonesForPane("bottom", snapshot.zones, cursorUnix, { lowerTf: snapshot.lower_tf, higherTf: snapshot.higher_tf });
          updateStructurePdLines("bottom", snapshot.higher_structure || null, { role: "native" });
          clearStructurePdLines("bottom", "projected");
        } else {
          setChartMode("single", {
            symbol: snapshot.symbol,
            timeframe: snapshot.timeframe,
          });
          renderChartPane("top", snapshot.bars, { preserveViewport, timeframe: snapshot.timeframe, events: snapshot.events });
          renderMarkersForPane("top", snapshot.events, snapshot.bars);
          renderZonesForPane("top", snapshot.zones, cursorUnix);
          updateStructurePdLines("top", snapshot.structure || null, { role: "native" });
          clearStructurePdLines("top", "projected");
          updateStructurePdLines("bottom", null, { role: "native" });  // clear bottom in single mode
          clearStructurePdLines("bottom", "projected");
        }
        renderEvents(snapshot.events);
        updateContextPanels(snapshot);
        refreshStatus();
      }

      async function loadBootstrap() {
        const [barsResponse, symbolsResponse] = await Promise.all([
          fetch("/api/bars"),
          fetch("/api/symbols"),
        ]);
        bootPayload = await barsResponse.json();
        const symbolsPayload = await symbolsResponse.json();
        const bootMode = symbolsPayload.default_mode || defaultMode;
        fillSymbolSelector(symbolsPayload);
        fillTimeframeSelector(symbolsPayload.timeframes || [], symbolsPayload.default_timeframe);
        fillDualComboSelector(symbolsPayload.dual_combos || dualComboConfig, symbolsPayload.default_dual_combo || defaultDualCombo);
        setModeValue(bootMode);
        if (bootMode === "dual") {
          setStatus("loading default dual replay session...");
          await createSession();
          return;
        }

        setStartTimeValue(bootPayload.default_start_time || bootPayload.window_start_time);
        setStartTimeBounds(bootPayload.data_start_time, bootPayload.data_end_time);

        setChartMode("single", { symbol: bootPayload.symbol, timeframe: bootPayload.timeframe });
        renderChartPane("top", bootPayload.bars, { preserveViewport: false, timeframe: bootPayload.timeframe });
        renderMarkersForPane("top", [], bootPayload.bars);
        renderChartPane("bottom", [], { preserveViewport: false });
        renderMarkersForPane("bottom", [], []);
        renderEvents([]);
        setStatus(
          `window bars: ${bootPayload.window_bars} · latest loaded · data: ${formatTimestamp(bootPayload.data_start_time)} → ${formatTimestamp(bootPayload.data_end_time)}`
        );
      }

      async function createSession() {
        const mode = document.getElementById("modeSelect").value;
        const startTime = mode === "dual" && !replaySessionId ? null : getStartTimeIso();
        const symbol = document.getElementById("symbolSelect").value;
        const timeframe = document.getElementById("timeframeSelect").value;
        const dualCombo = document.getElementById("dualComboSelect").value;
        const response = await fetch("/api/replay/session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ start_time: startTime, symbol, timeframe, mode, dual_combo: dualCombo }),
        });
        const payload = await response.json();
        replaySessionId = payload.metadata.session_id;
        setStartTimeValue(payload.metadata.default_start_time);
        setStartTimeBounds(payload.metadata.data_start_time, payload.metadata.data_end_time);
        applySnapshot(payload.snapshot, { preserveViewport: false });
        setReplayButtons(true);
        updatePlayPauseButton();
      }

      async function stepOnce() {
        if (!replaySessionId || stepRequestInFlight) return;
        stepRequestInFlight = true;
        try {
          const response = await fetch(`/api/replay/${replaySessionId}/step`, { method: "POST" });
          const payload = await response.json();
          applySnapshot(payload.snapshot);
          if (payload.step.done) {
            stopPlay();
            stopStepHold();
          }
        } finally {
          stepRequestInFlight = false;
        }
      }

      function stopStepHold() {
        if (stepHoldDelayTimer) {
          clearTimeout(stepHoldDelayTimer);
          stepHoldDelayTimer = null;
        }
        if (stepHoldRepeatTimer) {
          clearInterval(stepHoldRepeatTimer);
          stepHoldRepeatTimer = null;
        }
      }

      function installStepHoldRepeat() {
        const button = document.getElementById("stepBtn");
        const releaseEvents = ["pointerup", "pointercancel", "pointerleave", "lostpointercapture"];

        button.addEventListener("pointerdown", (event) => {
          if (event.button !== 0 || button.disabled || !replaySessionId) return;
          event.preventDefault();
          stopPlay();
          stopStepHold();
          suppressStepClick = true;
          if (button.setPointerCapture) {
            button.setPointerCapture(event.pointerId);
          }
          stepOnce();
          stepHoldDelayTimer = setTimeout(() => {
            stepHoldDelayTimer = null;
            stepHoldRepeatTimer = setInterval(stepOnce, stepHoldIntervalMs());
          }, 320);
        });

        for (const eventName of releaseEvents) {
          button.addEventListener(eventName, () => {
            stopStepHold();
            setTimeout(() => {
              suppressStepClick = false;
            }, 0);
          });
        }
      }

      function stopPlay() {
        if (playTimer) {
          clearInterval(playTimer);
          playTimer = null;
        }
        updatePlayPauseButton();
      }

      function startPlay() {
        if (!replaySessionId || playTimer) return;
        playTimer = setInterval(stepOnce, playbackIntervalMs());
        updatePlayPauseButton();
      }

      function togglePlayPause() {
        if (playTimer) {
          stopPlay();
          return;
        }
        startPlay();
      }

      async function resetReplay() {
        if (!replaySessionId) return;
        stopPlay();
        stopStepHold();
        const response = await fetch(`/api/replay/${replaySessionId}/reset`, { method: "POST" });
        const payload = await response.json();
        applySnapshot(payload.snapshot);
      }

      async function backOne() {
        if (!replaySessionId) return;
        stopPlay();
        stopStepHold();
        const response = await fetch(`/api/replay/${replaySessionId}/back`, { method: "POST" });
        const payload = await response.json();
        applySnapshot(payload.snapshot);
      }

      async function rewindToPickedBar(paneKey) {
        if (!replaySessionId) return;
        const targetTime = nearestBarTimeFromHover(paneKey);
        if (!targetTime) return;
        stopPlay();
        stopStepHold();
        const response = await fetch(`/api/replay/${replaySessionId}/rewind`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ target_time: targetTime, step_before: true }),
        });
        const payload = await response.json();
        applySnapshot(payload.snapshot);
        setRewindPickMode(false);
      }

      document.getElementById("fetchBtn").addEventListener("click", async () => {
        stopPlay();
        stopStepHold();
        await createSession();
      });
      document.getElementById("symbolSelect").addEventListener("change", async (event) => {
        const select = event.target;
        await refreshTimeframes(select.value);
      });
      document.getElementById("modeSelect").addEventListener("change", (event) => {
        updateModeUi(event.target.value);
      });
      document.getElementById("modeTrigger").addEventListener("click", (event) => {
        event.stopPropagation();
        toggleModeMenu();
      });
      document.querySelectorAll("[data-mode-value]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          setModeValue(button.dataset.modeValue);
        });
      });
      document.addEventListener("click", (event) => {
        if (!document.getElementById("modePicker").contains(event.target)) {
          closeModeMenu();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeModeMenu();
        }
      });
      document.getElementById("timeframeSelect").addEventListener("change", updateStartTimeStep);
      document.getElementById("dualComboSelect").addEventListener("change", updateStartTimeStep);
      document.getElementById("playSpeed").addEventListener("input", (event) => {
        updatePlaybackSpeed(event.target.value);
      });
      document.getElementById("stepBtn").addEventListener("click", (event) => {
        if (suppressStepClick) {
          event.preventDefault();
          return;
        }
        stepOnce();
      });
      installStepHoldRepeat();
      document.getElementById("playPauseBtn").addEventListener("click", togglePlayPause);
      document.getElementById("resetBtn").addEventListener("click", resetReplay);
      document.getElementById("copyEventsBtn").addEventListener("click", copyEventLog);
      document.getElementById("copyContextBtn").addEventListener("click", copyContextSection);
      document.getElementById("backBtn").addEventListener("click", backOne);
      document.getElementById("rewindPickBtn").addEventListener("click", () => {
        setRewindPickMode(!rewindPickMode);
      });
      document.getElementById("topChart").addEventListener("click", async () => {
        if (!rewindPickMode) return;
        await rewindToPickedBar("top");
      });
      document.getElementById("bottomChart").addEventListener("click", async () => {
        if (!rewindPickMode || currentSnapshotMode !== "dual") return;
        await rewindToPickedBar("bottom");
      });

      initStartTimePicker();
      loadBootstrap();
      updatePlaybackSpeed(document.getElementById("playSpeed").value);
      updatePlayPauseButton();
    </script>
  </body>
</html>
