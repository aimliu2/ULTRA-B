symbol: GBPUSD

# Session boundaries (UTC hours, half-open [start, end)).
# GBPUSD is a GBP/USD pair — London is the primary driver. NY overlap is highly
# active. Asian session is generally quiet for GBP.
sessions:
  overnight: [21,  0]  # 21–00 UTC — post-NY dead time (matches EURUSD convention)
  asian:     [0,   7]  # 00–07 UTC — quiet for GBP
  london:    [7,  12]  # 07–12 UTC — primary GBP session
  london_ny: [12, 17]  # 12–17 UTC — highly active overlap
  ny:        [17, 21]  # 17–21 UTC

data:
  root: big-data/mlData/raw
  file_pattern: "{symbol}-sorted-{timeframe}.parquet"

timeframes:
  execution: 1min

mechanics:
  # precomputed in features.py — change these only if regenerating features
  ema_touch: 20           # EMA period used to compute ema20 column
  ema_traj: 3             # EMA period used to compute ema3 column
  rsi_period: 30          # RSI period used to compute rsi30 column
  context_stable_bars: 3  # consecutive bars for context ST stability flag
  # live config — read by engine/strategy at runtime
  of_depth_a2: 4          # pivot lookback depth for A2 OF gate
  of_min_a2: 2            # minimum pivots required for A2 OF gate
  pivot_maxlen: 8         # max pivots stored in pivot array

hypotheses:
  A1:
    enabled: true
    trigger_mode: st_touch     # ema20_touch = touch EMA20 + clean_approach + bounce (default)
                               # ema20_rsi_v2 = ema20_touch + RSI gate
                               # st_touch = touch ST line ± 3pip + bounce, no clean_approach (V7 style)
    ema3_slope_mode: lax   # lax: ema3[n-2] > ema3[n]; strict: ema3[n-2] > ema3[n-1] > ema3[n] (inverse for shorts)
    sl_mode: fixed_15pip      # GBPUSD custom — 15 pip fixed (vs 12 pip default)
    rr: 1.5
    session_gate: true         # ON — confirmed [asian, london_ny] (Pass 2 phase6: ev=+0.085R)
    allowed_sessions: [asian, london_ny]         # london clearly negative both phases; overnight split
    pullback_gate: true        # ON — core hypothesis constraint (trend-following entry)
    flicker_suppression: own_hypothesis
    rsi_gate_enabled: false
    rsi_bull_gate: 55.0
    rsi_bear_gate: 48.0
  A2:
    enabled: true
    session_gate: true         # ON — confirmed [asian] (Pass 2 phase1: ev=+0.442R, pf=2.05)
    allowed_sessions: [asian]                    # edge concentrated in Asian only
    pullback_gate: true        # ON — core hypothesis constraint
    flicker_suppression: own_hypothesis
    of_direction_mode: lax   # lax = trust context TF direction (1H/4H/etc, phase-agnostic)
                              # strict = OF must be self-evident from pivot HH+HL pattern
                              #          ambiguous or insufficient pivots → skip trade
    pd_level: 0.51           # pullback depth to enter: 0.51 = 51%, 0.618 = 61.8%, etc.
    sl_min: 0.0015           # 15 pip floor on pivot-clamped SL
    sl_max: 0.0025           # 25 pip cap — matches previous GBPUSD study (same as AUDUSD)
    sl_epsilon: 0.0003       # 3 pip buffer beyond last pivot extreme
    rr: 1.5
  B:
    enabled: true
    session_gate: false
    allowed_sessions: [london, london_ny, ny]   # B eliminated — placeholder only
    pullback_gate: false
    flicker_suppression: own_hypothesis
    sl_fixed: 0.0025         # 25 pip fixed SL — matches previous GBPUSD study (same as AUDUSD)
    rr: 2.0

execution:
  policy: policy3
  require_context_stable: true
  cooldown_enabled: false
  cooldown_bars: 6
  max_concurrent_positions_per_symbol: 1
  same_bar_priority: [B, A2, A1]
  policy3:
    allow_any_direction_stack: true
    allow_same_bar_overlap: false
  policy2:
    trigger_first: true

combos:
  A1 only: [A1]
  A2 only: [A2]
  B only: [B]
  A1+B: [A1, B]
  A2+B: [A2, B]
  A1+A2+B: [A1, A2, B]

cross_phase:
  enabled: true
  branches:
    A1:
      enabled: true
      phase: phase6    # Round 3 winner: 15m/4H ST(12,3), ev=+0.085R, gate=asian+london_ny
    A2:
      enabled: true
      phase: phase1    # Round 3 winner: 5m/1H ST(12,3), ev=+0.442R, gate=asian
    B:
      enabled: false
      phase: phase1    # B eliminated — no edge found
  same_bar_priority: [B, A2, A1]
  max_concurrent_positions_per_symbol: 1

architecture_phases:
  phase1:
    label: 5m ST(12,3) entry vs 1H ST(12,3) context
    entry_timeframe: 5m
    context_timeframe: 1h
    entry_st: {period: 12, multiplier: 3.0}
    context_st: {period: 12, multiplier: 3.0}
  phase2:
    label: 5m ST(12,3) entry vs 1H ST(11,2) context
    entry_timeframe: 5m
    context_timeframe: 1h
    entry_st: {period: 12, multiplier: 3.0}
    context_st: {period: 11, multiplier: 2.0}
  phase3:
    label: 15m ST(12,3) entry vs 1H ST(12,3) context
    entry_timeframe: 15m
    context_timeframe: 1h
    entry_st: {period: 12, multiplier: 3.0}
    context_st: {period: 12, multiplier: 3.0}
  phase4:
    label: 15m ST(11,2) entry vs 1H ST(12,3) context
    entry_timeframe: 15m
    context_timeframe: 1h
    entry_st: {period: 11, multiplier: 2.0}
    context_st: {period: 12, multiplier: 3.0}
  phase5:
    label: 15m ST(11,2) entry vs 1H ST(11,2) context
    entry_timeframe: 15m
    context_timeframe: 1h
    entry_st: {period: 11, multiplier: 2.0}
    context_st: {period: 11, multiplier: 2.0}
  phase6:
    label: 15m ST(12,3) entry vs 4H ST(12,3) context
    entry_timeframe: 15m
    context_timeframe: 4h
    entry_st: {period: 12, multiplier: 3.0}
    context_st: {period: 12, multiplier: 3.0}
  phase7:
    label: 15m ST(11,2) entry vs 4H ST(12,3) context
    entry_timeframe: 15m
    context_timeframe: 4h
    entry_st: {period: 11, multiplier: 2.0}
    context_st: {period: 12, multiplier: 3.0}
  phase8:
    label: 15m ST(11,2) entry vs 4H ST(11,2) context
    entry_timeframe: 15m
    context_timeframe: 4h
    entry_st: {period: 11, multiplier: 2.0}
    context_st: {period: 11, multiplier: 2.0}

deployment:
  # Cross-phase A1+A2 — B excluded (dead across all phases)
  # A1 → phase6 (15m/4H ST12,3), session gate: asian + london_ny
  # A2 → phase1 (5m/1H ST12,3), session gate: asian only
  #
  # Cross-phase results: ev=+0.090R, total=+105.5R, dd=23.0R, ev/dd=0.391
  #   A1: 1142 trades, +0.086R ev, +98.0R total
  #   A2:   25 trades, +0.300R ev,  +7.5R total (low N, asian-only)
  #
  selected_phase: phase6     # A1 anchor phase
  selected_combo: A1+A2      # cross-phase deployment

regime_gate: {}
